<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; }
    .wrapper {
      width: 100vw;
      height: calc(100vh + 60px);
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <iframe src="https://heyzine.com/flip-book/b37407cc54.html"
            allowfullscreen>
    </iframe>
  </div>
</body>
</html>
