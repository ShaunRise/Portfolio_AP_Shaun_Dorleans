<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; }
    .wrapper {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .cover {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50px; /* ajuste selon la hauteur du logo */
      background: #1a1a2e; /* même couleur que le fond du flipbook */
      z-index: 999;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <iframe src="https://heyzine.com/flip-book/b37407cc54.html" allowfullscreen></iframe>
    <div class="cover"></div>
  </div>
</body>
</html>
